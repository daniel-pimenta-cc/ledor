name: ledor
description: >-
  Ledor — open-source Flutter speed reader. Words come to you: RSVP (Rapid
  Serial Visual Presentation) with ORP highlighting, smart timing, ramp-up,
  four reading modes (RSVP, scroll, ereader, TTS), EPUB + web articles,
  reading stats, and offline-first storage with optional Drive sync.
publish_to: 'none'
version: 0.2.1+3
repository: https://github.com/daniel-pimenta-cc/ledor
homepage: https://github.com/daniel-pimenta-cc/ledor
issue_tracker: https://github.com/daniel-pimenta-cc/ledor/issues

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # EPUB parsing
  epub_pro: ^5.6.0
  html: ^0.15.5

  # Web article import (readability-style extractor is in core/utils)
  http: ^1.2.2

  # Share-sheet target: accept URLs shared from browsers and other apps.
  receive_sharing_intent: ^1.8.1

  # Database
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5

  # Simple preferences
  shared_preferences: ^2.5.3

  # File handling
  file_picker: ^9.2.1

  # Google Drive sync. google_sign_in handles the OAuth flow (credentials are
  # provisioned in Google Cloud Console with the app's package name + SHA-1);
  # googleapis gives us the Drive v3 REST client; the extension bridges
  # GoogleSignIn tokens into an http.Client the googleapis consumes.
  google_sign_in: ^6.2.2
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

  # UI
  google_fonts: ^6.2.1
  flex_color_picker: ^3.6.0

  # Text-to-speech (mobile/desktop/web). Linux desktop is unsupported by
  # this package; the reader falls back to a custom speech-dispatcher socket
  # backend (which autospawns the daemon when the socket is absent).
  flutter_tts: ^4.2.5

  # Background TTS playback: foreground service on Android, AVAudioSession
  # category=playback on iOS, plus lockscreen / notification media controls
  # (play/pause/skip) on both. Linux desktop is unsupported — the engine
  # gates this behind PlatformCapabilities.supportsBackgroundAudio.
  audio_service: ^0.18.15

  # Scroll
  scrollable_positioned_list: ^0.3.8

  # Image processing (transitive dep of epub_pro, needed for cover encoding)
  image: ^4.8.0

  # Utilities
  uuid: ^4.5.1
  collection: ^1.19.1
  fl_chart: ^1.2.0
  share_plus: ^12.0.2
  desktop_drop: ^0.7.1
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.24.0
  mocktail: ^1.0.4
  shared_preferences_platform_interface: ^2.4.1
  path_provider_platform_interface: ^2.1.2
  archive: ^4.0.7
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  generate: true
  uses-material-design: true
  assets:
    # Bundled at build time so flutter_dotenv can load it from rootBundle.
    # The file is gitignored — copy .env.example to .env and fill it in.
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon_final.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#1F2937"
  adaptive_icon_foreground: "assets/icon/icon_final.png"

# Splash screen. Light/dark variants pulled from AppPalette (paper / ink-on-paper).
# Android 12+ uses the dedicated splash API; older Androids and iOS fall back to
# the classic launch screen. Regenerate with:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#F8F3EA"
  color_dark: "#15120F"
  image: "assets/icon/icon_final_transparent.png"
  image_dark: "assets/icon/icon_final_transparent.png"
  android_12:
    color: "#F8F3EA"
    color_dark: "#15120F"
    image: "assets/icon/icon_final_transparent.png"
    image_dark: "assets/icon/icon_final_transparent.png"
  android: true
  ios: true
  web: false
